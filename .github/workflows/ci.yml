name: CI

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12.13"
      - run: uv sync --locked
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12.13"
      - run: uv sync --locked
      - name: Mypy
        run: uv run mypy .

  docker:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t site-sentry .
      - name: Smoke-test image
        run: docker run --rm site-sentry uv run --locked pytest -m smoke

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    timeout-minutes: 30
    # Real visitors use Safari (WebKit) and Firefox, not just Chromium, so
    # PR/push runs exercise all three engines. fail-fast is off so one
    # engine's failure (e.g. a WebKit-only rendering bug) does not cancel
    # the others and hide whether the break is engine-specific.
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    name: test (${{ matrix.browser }})
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12.13"
      - run: |
          uv sync --locked
          uv run playwright install --with-deps ${{ matrix.browser }}
      - name: Run tests
        run: uv run pytest -v --browser ${{ matrix.browser }} --tracing retain-on-failure
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: |
            test-results/
            **/playwright-report/**
          retention-days: 30
