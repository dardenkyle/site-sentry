name: QA Tests

on:
  schedule:
    # Run twice daily at 6 AM and 6 PM UTC
    - cron: "0 6,18 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: Run QA Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv and Python 3.12.13
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12.13"

      - name: Install dependencies
        run: |
          uv sync --locked
          uv run playwright install --with-deps chromium

      - name: Run tests
        run: |
          uv run pytest -v
        continue-on-error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-report
          path: test-results/report.html
          retention-days: 30
