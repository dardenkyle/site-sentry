name: QA Tests

on:
  schedule:
    # Run twice daily at 6 AM and 6 PM UTC
    - cron: "0 6,18 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: Run QA Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Consumed by the alert job to pick incident severity and name the
    # failing tests; populated from junit.xml even when this job fails
    outputs:
      has_results: ${{ steps.failures.outputs.has_results }}
      failed_count: ${{ steps.failures.outputs.failed_count }}
      smoke_failed: ${{ steps.failures.outputs.smoke_failed }}
      failed_tests: ${{ steps.failures.outputs.failed_tests }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv and Python 3.12.13
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12.13"

      # Chromium only, deliberately. This is availability monitoring whose
      # single result gates one site-down incident issue; a browser matrix
      # would multiply that lifecycle and cost for no availability signal
      # the CI matrix (ci.yml) does not already provide on push/PR.
      - name: Install dependencies
        run: |
          uv sync --locked
          uv run playwright install --with-deps chromium

      - name: Run tests
        run: |
          uv run pytest -v --tracing retain-on-failure --junitxml=test-results/junit.xml
        continue-on-error: false

      - name: Summarize failures for the alert job
        id: failures
        if: always()
        run: uv run python .github/scripts/summarize_failures.py >> "$GITHUB_OUTPUT"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-report
          path: test-results/report.html
          retention-days: 30

  # Extract -> transform -> load -> serve. The pytest run above already
  # extracted this run's raw artifacts; this job transforms them into one
  # canonical record, loads it into the durable store (an orphan
  # metrics-data branch, one JSON per run, partitioned by date), and
  # serves the whole history as a GitHub Pages dashboard. Runs even when
  # the test job failed, on purpose: a failed run is a data point the
  # trend should show, not a gap. The store is git, so history survives
  # the 30-day artifact retention that would otherwise erase it.
  publish:
    name: Publish metrics and dashboard
    runs-on: ubuntu-latest
    needs: test
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    # Serialize store writes so a re-run racing the next scheduled run
    # cannot interleave two pushes to metrics-data and lose one.
    concurrency:
      group: metrics-store
      cancel-in-progress: false
    permissions:
      contents: write # push run records to the metrics-data branch
      pages: write # deploy the dashboard
      id-token: write # required by deploy-pages
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      GH_TOKEN: ${{ github.token }}
      STORE_BRANCH: metrics-data
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv and Python 3.12.13
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12.13"

      - run: uv sync --locked

      # This run's raw artifacts come from the test job. Tolerate their
      # absence: a run that died before uploading still gets a record,
      # keyed off the CI run id, so the outage is visible in the history.
      - name: Download this run's test results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: test-results
          path: test-results

      - name: Transform and load the run record into the store
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          repo_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Clone the store branch, or start it as an empty orphan on the
          # very first run so this bootstraps without manual setup.
          if git clone -q --branch "$STORE_BRANCH" --single-branch "$repo_url" store; then
            echo "Checked out existing $STORE_BRANCH"
          else
            rm -rf store
            git clone -q --depth 1 --single-branch "$repo_url" store
            git -C store checkout -q --orphan "$STORE_BRANCH"
            git -C store rm -rq --cached -- . || true
            find store -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            echo "Initialized new $STORE_BRANCH"
          fi

          # TRANSFORM + LOAD: normalize the artifacts into a record under
          # the store, keyed by run id so a re-run overwrites in place.
          uv run python -m pipeline.transform --results-dir test-results --store-dir store

          git -C store add runs
          if git -C store diff --cached --quiet; then
            echo "Record already present; store unchanged (idempotent re-run)"
          else
            git -C store commit -q -m "data: metrics for run ${GITHUB_RUN_ID} (${GITHUB_EVENT_NAME})"
            git -C store push -q origin "$STORE_BRANCH"
          fi

      - name: Build the dashboard site
        run: |
          set -euo pipefail
          # SERVE: fold the whole store into history.json beside the
          # static dashboard, so the page charts all runs, not the latest.
          mkdir -p site
          cp dashboard/index.html site/index.html
          uv run python -m pipeline.aggregate --store-dir store --out site/history.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # A red X in the Actions tab is not an alert: any scheduled run that
  # does not succeed (failure, timeout, cancellation) opens or updates
  # a single site-down incident issue, and the next passing scheduled
  # run closes it with the downtime recorded. Manual and PR runs never
  # touch incident issues.
  alert:
    name: Manage site-down incident issue
    runs-on: ubuntu-latest
    needs: test
    if: always() && github.event_name == 'schedule'
    # Serialize incident side effects so overlapping runs (e.g. a
    # re-run racing the next scheduled run) cannot duplicate the issue
    concurrency:
      group: site-down-incident
      cancel-in-progress: false
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      TEST_RESULT: ${{ needs.test.result }}
      HAS_RESULTS: ${{ needs.test.outputs.has_results }}
      FAILED_COUNT: ${{ needs.test.outputs.failed_count }}
      SMOKE_FAILED: ${{ needs.test.outputs.smoke_failed }}
      FAILED_TESTS: ${{ needs.test.outputs.failed_tests }}
    steps:
      # "Site down" is reserved for smoke-test failures; anything else is
      # reported as what it is (failing QA tests, or a run that produced
      # no results at all). The site-down label is the incident marker
      # for the open/comment/close lifecycle regardless of severity.
      - name: Open or update incident issue
        if: needs.test.result != 'success'
        run: |
          if [ "$SMOKE_FAILED" = "true" ]; then
            title="Site down: scheduled smoke tests failing"
            assessment="Smoke tests against the live site failed, so the site is likely down or broken."
          elif [ "$HAS_RESULTS" = "true" ] && [ "${FAILED_COUNT:-0}" -gt 0 ]; then
            title="QA run failed: $FAILED_COUNT test(s) failing"
            assessment="Smoke tests passed; the failures are in non-smoke tests, so the site itself is likely up."
          else
            title="QA run failed: no test results produced (result: $TEST_RESULT)"
            assessment="The run ended without a test report (setup failure, timeout, or cancellation), so site status is unknown."
          fi
          if [ -n "$FAILED_TESTS" ]; then
            failing=$(printf '%s\n' "$FAILED_TESTS" | sed 's/^/- `/; s/$/`/')
          else
            failing="- (no per-test results available)"
          fi
          details="$assessment

          Failing tests:
          $failing

          - Run: $RUN_URL
          - The \`html-report\` and \`test-results\` artifacts on the run have per-test details and Playwright traces."
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --label site-down --state open \
            --json number --jq '.[0].number // empty')
          if [ -z "$existing" ]; then
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --label site-down \
              --body "$details

          This issue is managed automatically: further unsuccessful scheduled runs add comments here, and the next passing scheduled run closes it."
          else
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" \
              --body "Still failing: $title

          $details"
          fi

      - name: Close incident issue on recovery
        if: needs.test.result == 'success'
        run: |
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --label site-down --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            created=$(gh issue view "$existing" --repo "$GITHUB_REPOSITORY" \
              --json createdAt --jq '.createdAt')
            minutes=$(( ($(date +%s) - $(date -d "$created" +%s)) / 60 ))
            gh issue close "$existing" --repo "$GITHUB_REPOSITORY" \
              --comment "Recovered: the scheduled QA run passed after ~$((minutes / 60))h $((minutes % 60))m of downtime.

          - Passing run: $RUN_URL"
          fi
